name: Continuous Deployment
on:
  workflow_dispatch:
  push:
    branches:
    - main
env:
    REPOSITORY: production/fss-site-v2
    # FRONTEND_REPOSITORY: /production/fss-site-v2
    IMAGE_TAG: latest #${{ github.sha }}

permissions:
  id-token: write
  contents: read 
  
jobs:
  backend:
    name: Deploy site 2
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6.0.0
      with:
        aws-region: us-east-1
        role-to-assume: arn:aws:iam::801528680042:role/fss-march-github-role

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push docker image to Amazon ECR
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -f ./Dockerfile \
            -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
        docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

    - uses: actions/checkout@v6
      with:
        repository: 'fss/fss-site-v2'
        token: ${{ secrets.PAT }}

    - name: Kustomize Edit
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        kustomize edit set image $REGISTRY/$REPOSITORY=$REGISTRY/$REPOSITORY:$IMAGE_TAG
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add ./kustomization.yml
        git commit -m "[BOT] Changing image to $REGISTRY/$REPOSITORY:$IMAGE_TAG"
        git push

